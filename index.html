<!DOCTYPE html>
<html id="html-tag" lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rizzoli Premium Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --p: #f97316; /* Rizzoli Orange */
            --bg: #000000; 
            --card: #121212; 
            --text: #ffffff; 
            --gray: #888888; 
            --border: #222222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .lang-card { text-align: center; width: 85%; }
        .logo-main { width: 180px; margin-bottom: 40px; filter: drop-shadow(0 0 15px rgba(249,115,22,0.3)); }
        .lang-btn { width: 100%; padding: 16px; margin: 10px 0; border-radius: 18px; border: 1.5px solid var(--p); background: transparent; color: white; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .lang-btn:active { background: var(--p); color: #000; transform: scale(0.95); }

        /* AR Section */
        .ar-box { position: relative; width: 100%; height: 45vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border-bottom: 1px solid var(--border); }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
        
        .model-info { position: absolute; bottom: 85px; width: 100%; text-align: center; padding: 0 20px; pointer-events: none; }
        .model-info h2 { font-size: 26px; font-weight: 900; color: var(--text); text-shadow: 0 2px 10px #000; letter-spacing: 1px; }
        .model-info p { font-size: 12px; color: var(--gray); margin: 5px 0 12px; }
        .model-info .price-tag { display: inline-block; background: var(--p); color: black; padding: 6px 18px; border-radius: 12px; font-size: 16px; font-weight: 900; box-shadow: 0 5px 15px rgba(249,115,22,0.4); }

        /* AR Button */
        .ar-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; color: black; border: none; padding: 12px 25px; border-radius: 50px; font-size: 15px; font-weight: bold; display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 20px rgba(255,255,255,0.2); cursor: pointer; z-index: 10; }

        .content { padding: 20px; }
        .section-label { font-weight: 900; margin: 35px 0 15px; font-size: 20px; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .section-label::before { content: ""; width: 5px; height: 20px; background: var(--p); border-radius: 10px; }

        /* 3D Tabs & List */
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { background: var(--card); color: var(--gray); padding: 10px 22px; border-radius: 12px; font-weight: bold; border: 1px solid var(--border); transition: 0.3s; white-space: nowrap; font-size: 14px; }
        .tab.active { background: var(--p); color: black; border-color: var(--p); }

        .h-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .h-list::-webkit-scrollbar { display: none; }
        .h-card { min-width: 110px; background: var(--card); padding: 15px 10px; border-radius: 20px; text-align: center; border: 1.5px solid var(--border); transition: 0.3s; }
        .h-card.active { border-color: var(--p); background: rgba(249,115,22,0.05); }
        .h-card span { font-size: 32px; display: block; margin-bottom: 8px; }
        .h-card h4 { font-size: 13px; font-weight: bold; }

        /* Visual Menu */
        .cat-header { background: var(--card); color: var(--p); padding: 12px 15px; border-radius: 12px; font-weight: 900; font-size: 15px; margin: 30px 0 15px; border: 1px solid var(--border); text-align: center;}
        .menu-item-card { background: var(--card); border-radius: 20px; overflow: hidden; display: flex; align-items: center; padding: 12px; gap: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .menu-item-card img { width: 90px; height: 90px; border-radius: 15px; object-fit: cover; border: 1px solid #222; }
        .item-details { flex: 1; }
        .item-details h4 { font-size: 16px; font-weight: 800; margin-bottom: 5px; color: var(--text); }
        .item-details p { font-size: 11px; color: var(--gray); line-height: 1.5; margin-bottom: 8px; }
        .item-price { font-weight: 900; color: var(--p); font-size: 14px; }

        /* Sauces */
        .sauce-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .sauce-item { text-align: center; }
        .sauce-item img { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid var(--card); margin-bottom: 5px; }
        .sauce-item h5 { font-size: 11px; color: var(--gray); }

        .progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--p); width: 0%; transition: 0.3s; }
    </style>
</head>

            sauces: [
                { name: {ku:"تێکساس", en:"Texas", ar:"تكساس"}, img: "https://cdn-icons-png.flaticon.com/512/5769/5769830.png" },
                { name: {ku:"پەنیر", en:"Cheese", ar:"جبن"}, img: "https://cdn-icons-png.flaticon.com/512/2153/2153788.png" },
                { name: {ku:"BBQ", en:"BBQ", ar:"باربيكيو"}, img: "https://cdn-icons-png.flaticon.com/512/3227/3227811.png" },
                { name: {ku:"سیر", en:"Garlic", ar:"ثوم"}, img: "https://cdn-icons-png.flaticon.com/512/1126/1126629.png" }
            ]
        };

        function startApp(l) {
            curL = l;
            document.getElementById('html-tag').dir = trans[l].dir;
            document.getElementById('3d-label').innerText = trans[l].label3d;
            document.getElementById('sauce-label').innerText = trans[l].sauce;
            document.getElementById('full-menu-label').innerText = trans[l].full;
            
            // گۆڕینی تێکستی دوگمەی AR
            document.getElementById('ar-txt').innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                ${trans[l].ar}`;

            renderTabs();
            renderSauces();
            renderVisualMenu();
            switchCat('burgers');
            document.getElementById('splash').style.transform = 'translateY(-100%)';
        }

        function renderTabs() {
            const cats = [{id:'burgers', n:{ku:"🍔 بەرگر", en:"Burgers", ar:"🍔 برجر"}}, {id:'rizzo', n:{ku:"🍚 ڕیزۆ", en:"Rizzo", ar:"🍚 ريزو"}}];
            document.getElementById('cat-tabs').innerHTML = cats.map(c => 
                `<div class="tab" id="tab-${c.id}" onclick="switchCat('${c.id}')">${c.n[curL] || c.n.ku}</div>`).join('');
        }

        function switchCat(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            const ms = menuData.models[id];
            document.getElementById('3d-list').innerHTML = ms.map((m, i) => `
                <div class="h-card ${i===0?'active':''}" onclick="updateMV('${m.file}', '${m.name[curL] || m.name.ku}', '${m.price}', '${m.ing[curL] || m.ing.ku}', '${m.scale}', this)">
                    <span>${m.icon}</span><h4>${m.name[curL] || m.name.ku}</h4>
                </div>`).join('');
            updateMV(ms[0].file, ms[0].name[curL] || ms[0].name.ku, ms[0].price, ms[0].ing[curL] || ms[0].ing.ku, ms[0].scale);
        }

        function updateMV(f, n, p, ing, sc, el) {
            const mv = document.getElementById('mv');
            mv.src = f;
            mv.setAttribute('scale', sc);
            document.getElementById('display-name').innerText = n;
            document.getElementById('display-ing').innerText = ing;
            document.getElementById('display-price').innerText = p;
            if(el) { document.querySelectorAll('.h-card').forEach(c => c.classList.remove('active')); el.classList.add('active'); }
        }

        function renderSauces() {
            document.getElementById('sauce-list').innerHTML = menuData.sauces.map(s => `
                <div class="sauce-item"><img src="${s.img}"><h5>${s.name[curL] || s.name.ku}</h5></div>`).join('');
        }

        function renderVisualMenu() {
            let html = '';
            menuData.fullMenu.forEach(cat => {
                html += `<div class="cat-header">${cat.cat[curL] || cat.cat.ku}</div>`;
                cat.items.forEach(item => {
                    html += `
                        <div class="menu-item-card">
                            <img src="${item.img}" onerror="this.src='https://via.placeholder.com/150/1a1a1a/f97316?text=Rizzoli'">
                            <div class="item-details">
                                <h4>${item.n[curL] || item.n.ku}</h4>
                                <p>${item.ing[curL] || item.ing.ku || ""}</p>
                                <span class="item-price">${item.p} IQD</span>
                            </div>
                        </div>`;
                });
            });
            document.getElementById('visual-menu-container').innerHTML = html;
        }

        document.getElementById('mv').addEventListener('progress', e => {
            document.getElementById('pb').style.width = (e.detail.totalProgress * 100) + '%';
        });
    </script>
</body>
</html>

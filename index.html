<!DOCTYPE html>
<html id="html-tag" lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rizzoli Premium Menu</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { 
            --p: #f97316; /* ڕەنگی ناریجی ڕیزۆلی */
            --bg: #000000; 
            --card: #121212; 
            --text: #ffffff; 
            --gray: #888888; 
            --border: #222222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; transition: 0.6s; }
        .logo-main { width: 150px; margin-bottom: 30px; }

        /* AR Section */
        .ar-box { position: relative; width: 100%; height: 45vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border-bottom: 1px solid var(--border); }
        model-viewer { width: 100%; height: 100%; }
        
        .model-info { position: absolute; bottom: 80px; width: 100%; text-align: center; padding: 0 20px; pointer-events: none; }
        .model-info h2 { font-size: 26px; font-weight: 900; color: var(--p); text-shadow: 0 0 10px rgba(249,115,22,0.5); }
        .model-info p { font-size: 13px; color: var(--gray); margin-top: 5px; }
        .model-info .price-tag { display: inline-block; background: var(--text); color: black; padding: 5px 15px; border-radius: 10px; font-weight: 900; margin-top: 10px; }

        .content { padding: 20px; }
        .section-label { font-weight: 900; margin: 30px 0 15px; font-size: 22px; color: var(--p); border-right: 4px solid var(--p); padding-right: 10px; }

        /* horizontal 3D List */
        .h-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .h-list::-webkit-scrollbar { display: none; }
        .h-card { min-width: 110px; background: var(--card); padding: 20px 10px; border-radius: 25px; text-align: center; border: 2px solid var(--border); transition: 0.3s; }
        .h-card.active { border-color: var(--p); background: rgba(249,115,22,0.05); }
        .h-card span { font-size: 30px; display: block; margin-bottom: 8px; }

        /* Visual Menu */
        .menu-item { background: var(--card); border-radius: 20px; display: flex; align-items: center; padding: 12px; gap: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        .menu-item img { width: 85px; height: 85px; border-radius: 15px; object-fit: cover; }
        .item-details h4 { font-size: 17px; color: var(--p); margin-bottom: 4px; }
        .item-details p { font-size: 12px; color: var(--gray); }

        .progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--p); width: 0%; }
    </style>
</head>
<body>

    <div id="splash">
        <div style="text-align: center;">
            <img src="1000241254.jpg" class="logo-main" alt="Rizzoli">
            <button style="padding: 15px 50px; border-radius: 15px; background: var(--p); border: none; font-weight: bold; cursor: pointer;" onclick="closeSplash()">دەستپێکردن</button>
        </div>
    </div>

    <div class="ar-box">
        <model-viewer id="mv" src="models/burger.glb" ar camera-controls auto-rotate shadow-intensity="1" scale="1 1 1">
            <div class="progress-bar" id="pb"></div>
        </model-viewer>
        <div class="model-info">
            <h2 id="display-name">بەرگری ڕیزۆلی</h2>
            <p id="display-ing">گۆشتی فرێش، پەنیر، کاهوو، سۆسی تایبەت</p>
            <div class="price-tag"><span id="display-price">7,500</span> IQD</div>
        </div>
    </div>

    <div class="content">
        <div class="section-label">مێنۆی ٣دی</div>
        <div class="h-list" id="3d-list">
            <div class="h-card active" onclick="updateModel('models/burger.glb', 'بەرگری ڕیزۆلی', 'گۆشتی فرێش، پەنیر، سۆسی تایبەت', '7,500', '1 1 1', this)">
                <span>🍔</span><h4>بەرگر</h4>
            </div>
            <div class="h-card" onclick="updateModel('models/chicken.glb', 'چێکن بۆکس', 'مریشکی سوورەکراو، فینگەر', '6,000', '1 1 1', this)">
                <span>📦</span><h4>بۆکس</h4>
            </div>
        </div>

        <div class="section-label">مێنۆی وێنەیی</div>
        <div id="visual-menu">
            <div class="menu-item">
                <img src="images/1000242352.png">
                <div class="item-details">
                    <h4>تاوەر بەرگر</h4>
                    <p>دوو پارچە گۆشت، پەنیر، تەماتە</p>
                    <b style="color:white">9,000 IQD</b>
                </div>
            </div>
        </div>
    </div>

    <script>
        function closeSplash() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 600);
        }

        function updateModel(file, name, ing, price, scale, element) {
            const mv = document.getElementById('mv');
            mv.src = file;
            
            // ئەم هێڵە زۆر گرنگە بۆ ئەوەی قەبارەکە ڕێک بێت
            // ئەگەر بینیت زۆر بچووکە، لە ناو هێڵەکەی خوارەوە لە جیاتی scale بینووسە "10 10 10"
            mv.setAttribute('scale', scale); 

            document.getElementById('display-name').innerText = name;
            document.getElementById('display-ing').innerText = ing;
            document.getElementById('display-price').innerText = price;

            // گۆڕینی ستایلی کارتەکان
            document.querySelectorAll('.h-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
        }

        // بارکردنی مۆدێلەکە
        document.getElementById('mv').addEventListener('progress', e => {
            document.getElementById('pb').style.width = (e.detail.totalProgress * 100) + '%';
        });
    </script>
</body>
</html>

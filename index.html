<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئەپی مروجەکان - الرحمە</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Kufi Arabic', sans-serif; background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 35px 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; width: 100%; max-width: 400px; margin-bottom: 20px; border: 1px solid #ffffff; }
        
        .company-logo { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid #3b82f6; margin-bottom: 15px; background-color: white; box-shadow: 0 4px 15px rgba(59,130,246,0.3);}
        h1 { color: #1e293b; font-size: 1.5rem; margin-bottom: 5px; font-weight: 900; }
        h2 { color: #64748b; margin-bottom: 5px; font-size: 1rem; font-weight: 400; }
        .day-badge { background-color: #f1f5f9; color: #3b82f6; padding: 6px 18px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; display: inline-block; margin-bottom: 25px; border: 1px solid #e2e8f0; }
        
        select { width: 100%; padding: 14px; font-size: 1.05rem; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 20px; font-family: 'Noto Kufi Arabic', sans-serif; background-color: #f8fafc; color: #1e293b; outline: none; transition: 0.3s; }
        select:focus { border-color: #3b82f6; background-color: #ffffff; }
        
        button { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(59,130,246,0.3); display: flex; justify-content: center; align-items: center; gap: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
        button:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; transform: none; color: #64748b; }
        
        button.stop { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); display: none; margin-top: 15px; box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
        button.stop:hover { box-shadow: 0 6px 20px rgba(239,68,68,0.4); }
        
        button.visit-btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); margin-top: 10px; box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
        button.visit-btn:hover { box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
        
        #status { margin-top: 15px; font-size: 0.95rem; color: #64748b; font-weight: bold; }
        .pulse { display: inline-block; width: 12px; height: 12px; background-color: #10b981; border-radius: 50%; animation: blink 1.5s infinite; margin-left: 8px; box-shadow: 0 0 10px #10b981; }
        @keyframes blink { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        
        #marketSection { display: none; margin-top: 25px; border-top: 2px dashed #e2e8f0; padding-top: 25px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo.jpeg" alt="لۆگۆی کۆمپانیا" class="company-logo">
        <h1>کۆمپانیای الرحمە</h1>
        <h2>ئەپی کارمەندانی مەیدانی</h2>
        <div class="day-badge" id="dayDisplay"><i class="fas fa-calendar-check"></i> ...</div>
        
        <select id="employeeSelect">
            <option value="emp1">کاک ئەلەند</option>
            <option value="emp2">کاک ئاراس</option>
            <option value="emp3">کاک کاروان</option>
        </select>
        
        <button id="startBtn"><i class="fas fa-satellite-dish"></i> دەستپێکردنی کار (لۆکەیشن)</button>
        <button id="stopBtn" class="stop"><i class="fas fa-power-off"></i> کۆتایهێنان بە دەوام</button>
        <div id="status">ئامادەیە بۆ دەستپێکردن</div>

        <div id="marketSection">
            <h2 style="color: #0f172a; margin-bottom: 15px; font-weight: 900; font-size:1.1rem;"><i class="fas fa-map-marker-alt" style="color:#ef4444;"></i> سەردانی مارکێتەکان</h2>
            <select id="marketSelect">
                </select>
            <button id="visitBtn" class="visit-btn"><i class="fas fa-check-circle"></i> سەردانم کرد و تەواو بووم</button>
            <div id="visitStatus" style="margin-top: 15px; font-size: 1rem; color: #10b981; font-weight:bold; min-height: 24px;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, push, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdH_pylFDT8apk4t6IAHrep4AvXrugYjY",
            authDomain: "mrawjlocat.firebaseapp.com",
            databaseURL: "https://mrawjlocat-default-rtdb.firebaseio.com",
            projectId: "mrawjlocat",
            storageBucket: "mrawjlocat.firebasestorage.app",
            messagingSenderId: "819047732014",
            appId: "1:819047732014:web:ce5da5c9520022a181e0bf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let watchId = null;

        const currentDayNum = new Date().getDay(); 
        const dayNames = ["یەکشەممە", "دووشەممە", "سێشەممە", "چوارشەممە", "پێنجشەممە", "هەینی", "شەممە"];
        const todayName = dayNames[currentDayNum];
        document.getElementById('dayDisplay').innerHTML = `<i class="fas fa-calendar-check"></i> مارکێتەکانی: ${todayName}`;

        const weeklyMarkets = {
            "شەممە": [],
            "یەکشەممە": [],
            "دووشەممە": [],
            "سێشەممە": [],
            "چوارشەممە": [
                { id: "wed_1", name: "هەرزان بازاڕی مالیکەی ١" },
                { id: "wed_2", name: "T.M.T سوپەرمارکێت" },
                { id: "wed_3", name: "هایپەرمارکێتی سەفرە" }
            ],
            "پێنجشەممە": [],
            "هەینی": []
        };

        const todayMarkets = weeklyMarkets[todayName] || [];
        const marketSelect = document.getElementById('marketSelect');
        const visitBtn = document.getElementById('visitBtn');
        
        if (todayMarkets.length > 0) {
            todayMarkets.forEach(m => {
                let option = document.createElement("option");
                option.value = m.id;
                option.text = m.name;
                marketSelect.appendChild(option);
            });
        } else {
            let option = document.createElement("option");
            option.text = "ئەمڕۆ هیچ مارکێتێک نییە";
            marketSelect.appendChild(option);
            visitBtn.disabled = true;
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            const empId = document.getElementById('employeeSelect').value;
            if (navigator.geolocation) {
                document.getElementById('status').innerHTML = '<span class="pulse"></span> بەدواداچوون چالاکە و ئۆنلاینیت';
                document.getElementById('status').style.color = '#10b981';
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'flex';
                document.getElementById('employeeSelect').disabled = true;
                if (todayMarkets.length > 0) document.getElementById('marketSection').style.display = 'block';

                watchId = navigator.geolocation.watchPosition((position) => {
                    set(ref(db, 'employees/' + empId), { lat: position.coords.latitude, lng: position.coords.longitude });
                }, (error) => {
                    document.getElementById('status').innerHTML = '<i class="fas fa-exclamation-triangle"></i> هەڵە هەیە، دڵنیابە GPS کراوەتەوە.';
                    document.getElementById('status').style.color = '#ef4444';
                }, { enableHighAccuracy: true });
            } else {
                alert("مۆبایلەکەت پشتگیری جی پی ئێس ناکات.");
            }
        });

        document.getElementById('visitBtn').addEventListener('click', () => {
            const empId = document.getElementById('employeeSelect').value;
            const marketId = document.getElementById('marketSelect').value;
            const marketName = document.getElementById('marketSelect').options[document.getElementById('marketSelect').selectedIndex].text;
            
            let dateObj = new Date();
            let currentTime = dateObj.toLocaleTimeString('ku-IQ');
            let currentDate = dateObj.toLocaleDateString('ku-IQ');

            set(ref(db, 'visited_markets/' + marketId), { by: empId, time: currentTime });
            push(ref(db, 'visit_history/' + empId), { market: marketName, date: currentDate, time: currentTime });

            document.getElementById('visitStatus').innerHTML = `<i class="fas fa-thumbs-up"></i> سەردانی (${marketName}) تۆمارکرا!`;
            setTimeout(() => { document.getElementById('visitStatus').innerHTML = ''; }, 3500);
        });

        document.getElementById('stopBtn').addEventListener('click', () => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            const empId = document.getElementById('employeeSelect').value;
            remove(ref(db, 'employees/' + empId)); 

            document.getElementById('status').innerHTML = '<i class="fas fa-bed"></i> دەوامت کۆتایی هات';
            document.getElementById('status').style.color = '#64748b';
            document.getElementById('startBtn').style.display = 'flex';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('employeeSelect').disabled = false;
            document.getElementById('marketSection').style.display = 'none';
        });
    </script>
</body>
</html>
